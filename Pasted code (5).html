<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALAsalitaan - Kilos Mo, Sagot Mo!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; overflow: hidden; }
        @keyframes blob {
          0% { transform: translate(0px, 0px) scale(1); }
          33% { transform: translate(30px, -50px) scale(1.1); }
          66% { transform: translate(-20px, 20px) scale(0.9); }
          100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .active-gesture { transform: scale(1.05); border-color: #f472b6; background-color: #fdf2f8; }
        video { border-radius: 2rem; }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-100 via-purple-100 to-blue-100 min-h-screen text-gray-700">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONS & ASSETS ---
        const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const IconCheck = ({size=80}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconX = ({size=80}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;

        const INITIAL_QUESTIONS = [
            { id: 1, text: "Saan naglakbay ang may-akda?", options: { thumbsup: "Baguio at Tagaytay", heart: "Banaue at Sagada", lookup: "Cebu at Bohol" }, answer: "heart" },
            { id: 2, text: "Kailan sila naglakbay?", options: { thumbsup: "Abril 23–25, 2023", heart: "Mayo 1–3, 2023", lookup: "Hunyo 10–12, 2023" }, answer: "thumbsup" },
            { id: 3, text: "Ano ang unang pinuntahan nila?", options: { thumbsup: "Sumaguing Cave", heart: "St. Mary Church", lookup: "Banaue Rice Terraces" }, answer: "lookup" },
            { id: 4, text: "Ano ang nakita sa viewpoint ng Sagada?", options: { thumbsup: "Bukang-liwayway", heart: "Talon", lookup: "Palengke" }, answer: "thumbsup" },
            { id: 5, text: "Ano ang ginawa nila sa Sumaguing Cave?", options: { thumbsup: "Lumangoy", heart: "Naglakad at gumapang", lookup: "Namili" }, answer: "heart" }
        ];

        // --- AUDIO ---
        let audioCtx = null;
        const initAudio = () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); };
        const playTone = (freq, duration, startTime) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + startTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + startTime + duration);
            osc.stop(audioCtx.currentTime + startTime + duration);
        };

        function App() {
            const [gameState, setGameState] = useState('menu');
            const [questions, setQuestions] = useState(INITIAL_QUESTIONS);
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState(null);
            const [detectedGesture, setDetectedGesture] = useState(null); // 'thumbsup', 'heart', 'lookup'
            const [progress, setProgress] = useState(0);
            const [scriptsLoaded, setScriptsLoaded] = useState(false);

            const videoRef = useRef(null);
            const isProcessingRef = useRef(false);

            useEffect(() => {
                const loadScripts = async () => {
                    const scripts = [
                        "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js",
                        "https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"
                    ];
                    for (const src of scripts) {
                        const s = document.createElement('script');
                        s.src = src;
                        document.head.appendChild(s);
                        await new Promise(r => s.onload = r);
                    }
                    setScriptsLoaded(true);
                };
                loadScripts();
            }, []);

            useEffect(() => {
                if (gameState !== 'playing' || !scriptsLoaded || !videoRef.current) return;

                const holistic = new window.Holistic({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
                });

                holistic.setOptions({
                    modelComplexity: 1,
                    smoothLandmarks: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                holistic.onResults((results) => {
                    let gesture = null;

                    // 1. HAND ON HEAD DETECTION ("Kamay sa Ulo")
                    if (results.faceLandmarks && (results.leftHandLandmarks || results.rightHandLandmarks)) {
                        const forehead = results.faceLandmarks[10];
                        const checkHandOnHead = (hand) => {
                            if (!hand) return false;
                            const indexTip = hand[8];
                            const dist = Math.sqrt(Math.pow(indexTip.x - forehead.x, 2) + Math.pow(indexTip.y - forehead.y, 2));
                            return dist < 0.15;
                        };
                        if (checkHandOnHead(results.leftHandLandmarks) || checkHandOnHead(results.rightHandLandmarks)) {
                            gesture = 'lookup';
                        }
                    }

                    // 2. HEART DETECTION (New "Puso" logic)
                    if (!gesture && results.leftHandLandmarks && results.rightHandLandmarks) {
                        const leftIndex = results.leftHandLandmarks[8];
                        const rightIndex = results.rightHandLandmarks[8];
                        const leftThumb = results.leftHandLandmarks[4];
                        const rightThumb = results.rightHandLandmarks[4];
                        
                        const distIndices = Math.sqrt(Math.pow(leftIndex.x - rightIndex.x, 2) + Math.pow(leftIndex.y - rightIndex.y, 2));
                        const distThumbs = Math.sqrt(Math.pow(leftThumb.x - rightThumb.x, 2) + Math.pow(leftThumb.y - rightThumb.y, 2));

                        // If index tips and thumb tips are close to each other
                        if (distIndices < 0.1 && distThumbs < 0.1) {
                           gesture = 'heart';
                        }
                    }

                    // 3. TWO THUMBS UP DETECTION
                    if (!gesture && results.leftHandLandmarks && results.rightHandLandmarks) {
                        const checkThumb = (hand) => {
                            const isThumbUp = hand[4].y < hand[3].y && hand[4].y < hand[2].y;
                            const isFingersDown = hand[8].y > hand[6].y && hand[12].y > hand[10].y;
                            return isThumbUp && isFingersDown;
                        };
                        if (checkThumb(results.leftHandLandmarks) && checkThumb(results.rightHandLandmarks)) {
                            gesture = 'thumbsup';
                        }
                    }

                    setDetectedGesture(gesture);
                });

                const camera = new window.Camera(videoRef.current, {
                    onFrame: async () => { if (videoRef.current) await holistic.send({ image: videoRef.current }); },
                    width: 640, height: 480
                });
                camera.start();

                return () => { camera.stop(); holistic.close(); };
            }, [gameState, scriptsLoaded]);

            useEffect(() => {
                if (gameState !== 'playing' || isProcessingRef.current || !detectedGesture) {
                    setProgress(0);
                    return;
                }
                const interval = setInterval(() => {
                    setProgress(p => {
                        if (p >= 100) { handleAnswer(detectedGesture); return 0; }
                        return p + 5;
                    });
                }, 50);
                return () => clearInterval(interval);
            }, [detectedGesture, gameState]);

            const handleAnswer = (choice) => {
                if (isProcessingRef.current) return;
                isProcessingRef.current = true;
                const correct = questions[currentQ].answer === choice;
                initAudio();

                if (correct) {
                    const pts = Math.floor(Math.random() * 5) + 1;
                    setScore(s => s + pts);
                    setFeedback({ type: 'correct', pts });
                    playTone(523, 0.2, 0); playTone(659, 0.2, 0.1); playTone(783, 0.3, 0.2);
                } else {
                    setFeedback({ type: 'wrong' });
                    playTone(300, 0.3, 0); playTone(200, 0.4, 0.2);
                }

                setTimeout(() => {
                    setFeedback(null);
                    setProgress(0);
                    if (currentQ + 1 < questions.length) {
                        setCurrentQ(currentQ + 1);
                        isProcessingRef.current = false;
                    } else {
                        setGameState('gameover');
                    }
                }, 2000);
            };

            const renderOverlay = () => feedback && (
                <div className="absolute inset-0 flex flex-col items-center justify-center bg-white/90 z-50 animate-in fade-in zoom-in duration-300 rounded-[2rem]">
                    {feedback.type === 'correct' ? (
                        <>
                            <div className="text-teal-400 mb-4 animate-bounce"><IconCheck size={100}/></div>
                            <h2 className="text-5xl font-black text-teal-600">Ang Galing!</h2>
                            <p className="text-xl font-bold bg-teal-400 text-white px-6 py-2 rounded-full mt-4">+{feedback.pts} puntos</p>
                        </>
                    ) : (
                        <>
                            <div className="text-pink-400 mb-4 animate-pulse"><IconX size={100}/></div>
                            <h2 className="text-5xl font-black text-pink-600">Subukan uli!</h2>
                        </>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center p-6 relative">
                    <div className="absolute top-0 left-0 w-96 h-96 bg-pink-200 blur-[120px] rounded-full opacity-30 animate-blob"></div>
                    <div className="absolute bottom-0 right-0 w-96 h-96 bg-blue-200 blur-[120px] rounded-full opacity-30 animate-blob"></div>

                    {gameState === 'menu' && (
                        <div className="text-center bg-white/80 p-12 rounded-[4rem] shadow-2xl border-8 border-white backdrop-blur-md max-w-2xl">
                            <h1 className="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500 mb-8">TALAsalitaan</h1>
                            <div className="grid grid-cols-3 gap-4 mb-10">
                                <div className="bg-white p-4 rounded-3xl border-4 border-teal-50">
                                    <div className="text-4xl mb-2">👍👍</div>
                                    <div className="font-bold text-teal-600 text-sm">2 Thumbs Up</div>
                                </div>
                                <div className="bg-white p-4 rounded-3xl border-4 border-blue-50">
                                    <div className="text-4xl mb-2">🫶❤️</div>
                                    <div className="font-bold text-blue-600 text-sm">Puso</div>
                                </div>
                                <div className="bg-white p-4 rounded-3xl border-4 border-pink-50">
                                    <div className="text-4xl mb-2">🙋‍♂️🍎</div>
                                    <div className="font-bold text-pink-600 text-sm">Kamay sa Ulo</div>
                                </div>
                            </div>
                            <button onClick={() => { initAudio(); setGameState('playing'); }} className="w-full bg-gradient-to-r from-teal-300 to-teal-400 hover:scale-105 text-teal-900 py-6 rounded-[2.5rem] text-3xl font-black transition-all shadow-xl border-4 border-white flex items-center justify-center gap-3">
                                <IconPlay /> Simulan!
                            </button>
                        </div>
                    )}

                    {gameState === 'playing' && (
                        <div className="w-full max-w-6xl flex flex-col items-center">
                            <div className="flex justify-between w-full mb-6 bg-white/80 p-4 rounded-full border-4 border-white shadow-sm font-black text-purple-600 text-xl px-10">
                                <div>Tanong: {currentQ + 1} / {questions.length}</div>
                                <div className="text-teal-500">Puntos: {score}</div>
                            </div>

                            <div className="bg-white/95 p-10 rounded-[3rem] shadow-xl border-8 border-white mb-8 text-center w-full">
                                <h2 className="text-4xl font-black text-purple-700 leading-tight">{questions[currentQ].text}</h2>
                            </div>

                            <div className="flex w-full gap-8 items-stretch justify-center">
                                {/* Option 1: Thumbs Up */}
                                <div className={`flex-1 p-6 rounded-[3rem] border-8 transition-all flex flex-col items-center justify-center text-center ${detectedGesture === 'thumbsup' ? 'active-gesture border-teal-400' : 'bg-white border-white opacity-90'}`}>
                                    <div className="text-6xl mb-4">👍👍</div>
                                    <p className="text-xl font-bold text-gray-600">{questions[currentQ].options.thumbsup}</p>
                                    {detectedGesture === 'thumbsup' && (
                                        <div className="mt-4 w-full h-3 bg-teal-100 rounded-full overflow-hidden">
                                            <div className="h-full bg-teal-400 transition-all" style={{width: `${progress}%`}}></div>
                                        </div>
                                    )}
                                </div>

                                {/* Camera View */}
                                <div className="relative w-[480px] h-[360px] bg-white rounded-[3rem] overflow-hidden border-8 border-white shadow-2xl">
                                    <video ref={videoRef} className="w-full h-full object-cover transform scale-x-[-1]" playsInline muted />
                                    {renderOverlay()}
                                    <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-black/50 text-white px-6 py-2 rounded-full font-black text-center min-w-[200px]">
                                        {detectedGesture ? (
                                            detectedGesture === 'lookup' ? 'Kilos: Kamay sa Ulo' : 
                                            detectedGesture === 'heart' ? 'Kilos: Puso' : 
                                            `Kilos: ${detectedGesture}`
                                        ) : "Ipakita ang kilos!"}
                                    </div>
                                </div>

                                {/* Options 2 & 3 */}
                                <div className="flex-1 flex flex-col gap-6">
                                    <div className={`flex-1 p-6 rounded-[3rem] border-8 transition-all flex items-center gap-4 ${detectedGesture === 'heart' ? 'active-gesture border-blue-400' : 'bg-white border-white opacity-90'}`}>
                                        <div className="text-5xl">🫶❤️</div>
                                        <div className="flex-1">
                                            <p className="text-lg font-bold text-gray-600">{questions[currentQ].options.heart}</p>
                                            {detectedGesture === 'heart' && (
                                                <div className="mt-2 h-3 bg-blue-100 rounded-full overflow-hidden">
                                                    <div className="h-full bg-blue-400 transition-all" style={{width: `${progress}%`}}></div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className={`flex-1 p-6 rounded-[3rem] border-8 transition-all flex items-center gap-4 ${detectedGesture === 'lookup' ? 'active-gesture border-pink-400' : 'bg-white border-white opacity-90'}`}>
                                        <div className="text-5xl">🙋‍♂️🍎</div>
                                        <div className="flex-1">
                                            <p className="text-lg font-bold text-gray-600">{questions[currentQ].options.lookup}</p>
                                            {detectedGesture === 'lookup' && (
                                                <div className="mt-2 h-3 bg-pink-100 rounded-full overflow-hidden">
                                                    <div className="h-full bg-pink-400 transition-all" style={{width: `${progress}%`}}></div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {gameState === 'gameover' && (
                        <div className="text-center bg-white/90 p-16 rounded-[4rem] shadow-2xl border-8 border-white">
                            <h1 className="text-5xl font-black text-purple-600 mb-8">Napakagaling! 🎉</h1>
                            <div className="text-9xl font-black text-teal-400 mb-4">{score}</div>
                            <p className="text-2xl font-bold text-purple-400 mb-12">Kabuuang Puntos</p>
                            <button onClick={() => { setCurrentQ(0); setScore(0); setGameState('menu'); }} className="bg-pink-400 text-white py-5 px-16 rounded-full text-2xl font-black shadow-lg border-4 border-white">Ulitin ang Laro</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
